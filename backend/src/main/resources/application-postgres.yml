spring:
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/enterprise_approval}
    username: ${APP_DATASOURCE_USERNAME:postgres}
    password: ${APP_DATASOURCE_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  environment: ${APP_ENVIRONMENT:development}
  attachments:
    storage-path: ${APP_ATTACHMENT_STORAGE_PATH:./storage/attachments}
